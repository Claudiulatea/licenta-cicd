name: CI/CD Pipeline Standard

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarcă codul pe serverul din cloud
    - name: Checkout cod
      uses: actions/checkout@v4

    # Verificare secrete Docker Hub (fail-fast cu mesaj clar)
    - name: Verificare secrete Docker Hub
      run: |
        if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
          echo "Error: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not set" >&2
          exit 1
        else
          echo "Docker Hub secrets present"
        fi

    # 2. Se loghează pe contul tău de Docker Hub usando secretele configurate
    - name: Autentificare Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Construiește imaginea Docker și o urcă direct pe Docker Hub
    - name: Build și Push Imagine Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/licenta-app:latest
