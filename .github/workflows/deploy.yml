name: CI/CD Pipeline cu Gardian AI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarcă codul pe serverul din cloud
    - name: Checkout cod
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # 2. Pune Python pe serverul din cloud
    - name: Configurare Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. Rulează Gardianul AI (DeepSeek)
    - name: Rulare Gardian AI (DeepSeek Validation & Self-Healing)
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python gardian.py

    # 4. Trimite înapoi în Git dacă DeepSeek a trebuit să repare vreo greșeală
    - name: Trimite modificările în Git (dacă există reparații)
      run: |
        git config --global user.name "Gardian AI [DeepSeek]"
        git config --global user.email "gardian-ai@cicd.local"
        if git diff --quiet app.py; then
          echo "Nu au fost necesare reparații."
        else
          git add app.py
          git commit -m "[Self-Healing] Corecții automate aplicate de DeepSeek"
          git push
        fi

    # 5. Se loghează pe contul tău de Docker Hub
    - name: Autentificare Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 6. Construiește imaginea finală și o urcă pe Docker Hub
    - name: Build și Push Imagine Docker
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: claudiulatea2/licenta-app:latest
